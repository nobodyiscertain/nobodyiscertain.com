<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melodaze — Dashboard Mockup</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #fafafa;
      color: #111;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 40px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-logo {
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 500;
      color: #999;
      text-decoration: none;
    }

    .nav-items {
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .nav-items a {
      font-size: 0.82rem;
      color: #bbb;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-items a.active { color: #111; }
    .nav-items a:hover { color: #111; }

    /* Main content */
    .main {
      max-width: 700px;
      margin: 0 auto;
      padding: 80px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-height: calc(100vh - 53px);
      justify-content: center;
    }

    /* Album art */
    .album-art {
      width: 380px;
      height: 380px;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
    }

    /* Fake album art text */
    .album-art-text {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      top: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px;
      color: rgba(255,255,255,0.15);
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      text-align: left;
    }

    .album-title {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .album-artist {
      font-size: 1rem;
      color: #999;
      font-weight: 400;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 24px;
      align-items: center;
      margin-top: 32px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.82rem;
      color: #bbb;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
      padding: 8px 0;
    }

    .ctrl-btn:hover { color: #111; }

    .ctrl-btn.primary {
      background: #111;
      color: #fff;
      padding: 12px 28px;
      font-weight: 500;
    }

    .ctrl-btn.primary:hover { background: #333; }

    /* Now Playing bar */
    .now-playing {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid #eee;
      padding: 12px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .np-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .np-art {
      width: 40px;
      height: 40px;
      background: #1a1a1a;
    }

    .np-track {
      font-size: 0.82rem;
      font-weight: 500;
    }

    .np-artist {
      font-size: 0.72rem;
      color: #999;
    }

    .np-controls {
      display: flex;
      gap: 20px;
      font-size: 0.82rem;
      color: #bbb;
    }

    .np-controls span { cursor: pointer; transition: color 0.2s; }
    .np-controls span:hover { color: #111; }

    .np-time {
      font-size: 0.72rem;
      color: #ccc;
      font-family: monospace;
    }

    @media (max-width: 600px) {
      .main { padding: 40px 24px; }
      .album-art { width: 280px; height: 280px; }
      nav { padding: 16px 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">Melodaze</a>
    <div class="nav-items">
      <a href="#" class="active">Dashboard</a>
      <a href="mockup-search.html">Search</a>
      <a href="#">Analytics</a>
      <a href="mockup-settings.html">Settings</a>
      <a href="#">Logout</a>
    </div>
  </nav>

  <div class="main">
    <div class="album-art">
      <div class="album-art-text">
        ALABAMA<br>
        SHAKES<br>
        SOUND &<br>
        COLOR
      </div>
    </div>

    <div class="album-title">Sound & Color</div>
    <div class="album-artist">Alabama Shakes</div>

    <div class="controls">
      <button class="ctrl-btn">← Skip</button>
      <button class="ctrl-btn primary">Drop the needle</button>
      <button class="ctrl-btn">Skip →</button>
    </div>
  </div>

  <div class="now-playing">
    <div class="np-info">
      <div class="np-art"></div>
      <div>
        <div class="np-track">Don't Wanna Fight</div>
        <div class="np-artist">Alabama Shakes</div>
      </div>
    </div>
    <div class="np-controls">
      <span>⏮</span>
      <span>▶</span>
      <span>⏭</span>
    </div>
    <div class="np-time">2:34 / 5:12</div>
  </div>

</body>
</html>
