<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melodaze CTA — Takeover</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    nav {
      padding: 20px 40px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 20;
      background: #fff;
    }
    .logo { font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 500; color: #999; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { font-size: 0.82rem; color: #bbb; text-decoration: none; }
    .nav-links a.active { color: #111; }

    .dashboard {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      user-select: none;
    }

    .grooves-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .groove-ring {
      position: absolute;
      border: 1px solid #e8e8e8;
      border-radius: 50%;
      opacity: 0.35;
      transition: opacity 0.6s ease, border-color 0.6s ease;
    }

    /* Spindle — starts small, grows on mouse approach */
    .spindle {
      position: absolute;
      width: 40px;
      height: 40px;
      background: #111;
      border-radius: 50%;
      z-index: 5;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: width 0.5s cubic-bezier(0.23, 1, 0.32, 1),
                  height 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .spindle-text {
      color: #fff;
      font-size: 0.72rem;
      font-weight: 400;
      text-align: center;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.4s ease;
      padding: 0 16px;
      white-space: nowrap;
    }

    /* Black takeover */
    .takeover {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #111;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: none;
    }

    .takeover.expanding {
      pointer-events: all;
    }

    .takeover.active {
      opacity: 1;
      pointer-events: all;
    }

    /* Expanding circle animation — hidden until triggered */
    .expand-circle {
      position: fixed;
      background: #111;
      border-radius: 50%;
      z-index: 14;
      pointer-events: none;
      display: none;
    }

    /* Result content on black bg */
    .result-content {
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease 0.5s, transform 0.5s ease 0.5s;
    }

    .takeover.active .result-content {
      opacity: 1;
      transform: translateY(0);
    }

    .result-content .album-art {
      width: 340px;
      height: 340px;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460, #e94560);
      margin: 0 auto 28px;
    }

    .result-content .album-title {
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 4px;
    }

    .result-content .artist-name {
      font-size: 1rem;
      color: #666;
      margin-bottom: 36px;
    }

    .result-actions {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
    }

    .btn-white {
      background: #fff;
      color: #111;
      padding: 14px 32px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-white:hover { background: #e0e0e0; }

    .btn-ghost-white {
      font-size: 0.82rem;
      color: #666;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      transition: color 0.2s;
    }
    .btn-ghost-white:hover { color: #fff; }

    /* Filter */
    .filter-area {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .filter-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #ccc;
      transition: color 0.2s;
    }
    .filter-icon:hover { color: #999; }

    .filter-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #ccc;
      margin-top: 2px;
    }

    .genre-pills {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      pointer-events: none;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-area:hover .genre-pills {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    .filter-area:hover .filter-label { color: #999; }

    .genre-pill {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 5px 12px;
      border: 1px solid #ddd;
      color: #999;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
      font-family: inherit;
    }
    .genre-pill:hover { border-color: #111; color: #111; }
    .genre-pill.active { background: #111; border-color: #111; color: #fff; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">MELODAZE</div>
    <div class="nav-links">
      <a href="#" class="active">Dashboard</a>
      <a href="#">Collection</a>
      <a href="#">Analytics</a>
      <a href="#">Settings</a>
    </div>
  </nav>

  <div class="dashboard" id="emptyState">
    <div class="grooves-bg" id="groovesBg"></div>

    <div class="spindle" id="spindle" onclick="triggerTakeover()">
      <div class="spindle-text">Rediscover what<br>you already own</div>
    </div>

    <div class="filter-area">
      <div class="filter-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="4" y1="6" x2="20" y2="6"></line>
          <line x1="7" y1="12" x2="17" y2="12"></line>
          <line x1="10" y1="18" x2="14" y2="18"></line>
        </svg>
      </div>
      <div class="filter-label">Filter</div>
      <div class="genre-pills">
        <button class="genre-pill active">All</button>
        <button class="genre-pill">Rock</button>
        <button class="genre-pill">Jazz</button>
        <button class="genre-pill">Electronic</button>
        <button class="genre-pill">Hip Hop</button>
        <button class="genre-pill">Soul</button>
        <button class="genre-pill">Classical</button>
        <button class="genre-pill">Folk</button>
      </div>
    </div>
  </div>

  <!-- Expanding circle (animates from spindle position) -->
  <div class="expand-circle" id="expandCircle"></div>

  <!-- Black takeover with result -->
  <div class="takeover" id="takeover">
    <div class="result-content">
      <div class="album-art"></div>
      <div class="album-title">In Rainbows</div>
      <div class="artist-name">Radiohead</div>
      <div class="result-actions">
        <button class="btn-white" onclick="triggerTakeover()">Pull another</button>
        <button class="btn-ghost-white" onclick="resetState()">back to crate</button>
      </div>
    </div>
  </div>

  <script>
    const dashboard = document.getElementById('emptyState');
    const groovesBg = document.getElementById('groovesBg');
    const spindle = document.getElementById('spindle');
    const expandCircle = document.getElementById('expandCircle');
    const takeover = document.getElementById('takeover');

    // Generate rings with exponential spacing
    const rings = [];
    let pos = 150; // start outside the spindle
    for (let i = 0; i < 28; i++) {
      const ring = document.createElement('div');
      ring.className = 'groove-ring';
      const gap = 16 + Math.pow(i, 1.35) * 2.5;
      pos += gap;
      ring.style.width = pos + 'px';
      ring.style.height = pos + 'px';
      groovesBg.appendChild(ring);
      rings.push({ el: ring, radius: pos / 2 });
    }

    // Idle ring breathing
    rings.forEach((ring, i) => {
      ring.el.style.animation = `idleBreathe ${5 + (i % 4)}s ease-in-out infinite`;
      ring.el.style.animationDelay = (i * 0.15) + 's';
    });

    // Add idle breathe keyframes
    const style = document.createElement('style');
    style.textContent = `@keyframes idleBreathe { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.4; } }`;
    document.head.appendChild(style);

    function getCenter() {
      const rect = dashboard.getBoundingClientRect();
      return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    }

    let rafId;
    dashboard.addEventListener('mousemove', (e) => {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(() => {
        const center = getCenter();
        const distFromCenter = Math.sqrt(
          Math.pow(e.clientX - center.x, 2) + Math.pow(e.clientY - center.y, 2)
        );

        const maxDist = Math.sqrt(Math.pow(window.innerWidth, 2) + Math.pow(window.innerHeight, 2)) * 0.4;
        const closeness = Math.max(0, 1 - distFromCenter / maxDist);

        // Spindle grows: 40px → 200px as mouse approaches
        const spindleSize = 40 + closeness * closeness * 160;
        spindle.style.width = spindleSize + 'px';
        spindle.style.height = spindleSize + 'px';

        // Show text inside spindle when large enough
        const textEl = spindle.querySelector('.spindle-text');
        textEl.style.opacity = closeness > 0.55 ? Math.min(1, (closeness - 0.55) / 0.2) : 0;

        // Cursor when close
        dashboard.style.cursor = distFromCenter < 120 ? 'pointer' : 'default';

        // Rings: follow mouse + proximity
        rings.forEach((ring) => {
          ring.el.style.animation = 'none';
          const distFromRing = Math.abs(distFromCenter - ring.radius);
          const proximity = Math.max(0, 1 - distFromRing / 160);
          ring.el.style.opacity = 0.15 + proximity * 0.5 + closeness * 0.15;
          const gray = Math.round(230 - proximity * 30);
          ring.el.style.borderColor = `rgb(${gray}, ${gray}, ${gray})`;
        });
      });
    });

    dashboard.addEventListener('mouseleave', () => {
      // Reset spindle
      spindle.style.width = '';
      spindle.style.height = '';
      spindle.querySelector('.spindle-text').style.opacity = '0';
      dashboard.style.cursor = '';

      // Restore ring breathing
      rings.forEach((ring, i) => {
        ring.el.style.animation = `idleBreathe ${5 + (i % 4)}s ease-in-out infinite`;
        ring.el.style.animationDelay = (i * 0.15) + 's';
        ring.el.style.opacity = '';
        ring.el.style.borderColor = '';
      });
    });

    // Takeover animation — circle expands smoothly from current spindle size
    function triggerTakeover() {
      const center = getCenter();
      const maxDim = Math.max(window.innerWidth, window.innerHeight) * 2.5;
      const duration = 800;

      // Start from current spindle size
      const currentSize = spindle.offsetWidth || 40;
      const half = currentSize / 2;
      expandCircle.style.left = (center.x - half) + 'px';
      expandCircle.style.top = (center.y - half) + 'px';
      expandCircle.style.width = currentSize + 'px';
      expandCircle.style.height = currentSize + 'px';
      expandCircle.style.transition = 'none';
      expandCircle.style.display = 'block';

      // Force reflow
      expandCircle.offsetHeight;

      // Animate: grow from 120px to fill entire viewport
      expandCircle.style.transition = `width ${duration}ms cubic-bezier(0.4, 0, 0.15, 1), height ${duration}ms cubic-bezier(0.4, 0, 0.15, 1), left ${duration}ms cubic-bezier(0.4, 0, 0.15, 1), top ${duration}ms cubic-bezier(0.4, 0, 0.15, 1)`;
      expandCircle.style.width = maxDim + 'px';
      expandCircle.style.height = maxDim + 'px';
      expandCircle.style.left = (center.x - maxDim / 2) + 'px';
      expandCircle.style.top = (center.y - maxDim / 2) + 'px';

      // Hide dashboard partway through
      setTimeout(() => {
        dashboard.style.display = 'none';
      }, duration * 0.4);

      // Show result content after circle has covered screen
      setTimeout(() => {
        takeover.classList.add('active');
      }, duration * 0.6);

      // Clean up circle after fully expanded
      setTimeout(() => {
        expandCircle.style.display = 'none';
      }, duration + 100);
    }

    function resetState() {
      takeover.classList.remove('active');
      dashboard.style.display = '';
      rings.forEach(ring => {
        ring.el.style.opacity = '0.35';
        ring.el.style.borderColor = '';
      });
    }

    // Touch
    dashboard.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      dashboard.dispatchEvent(new MouseEvent('mousemove', {
        clientX: touch.clientX,
        clientY: touch.clientY
      }));
    }, { passive: false });

    // Genre pills
    document.querySelectorAll('.genre-pill').forEach(pill => {
      pill.addEventListener('click', function(e) {
        e.stopPropagation();
        document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
