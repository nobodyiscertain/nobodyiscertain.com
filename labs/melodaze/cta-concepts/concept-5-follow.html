<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melodaze CTA — Follow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    nav {
      padding: 20px 40px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 10;
      background: #fafafa;
    }
    .logo { font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 500; color: #999; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { font-size: 0.82rem; color: #bbb; text-decoration: none; }
    .nav-links a.active { color: #111; }

    .dashboard {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    /* Groove rings */
    .grooves-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .groove-ring {
      position: absolute;
      border: 1px solid #eee;
      border-radius: 50%;
      opacity: 0.3;
      transition: opacity 0.6s ease, border-color 0.6s ease;
    }

    .groove-ring:nth-child(1)  { width: 80px;   height: 80px; }
    .groove-ring:nth-child(2)  { width: 140px;  height: 140px; }
    .groove-ring:nth-child(3)  { width: 200px;  height: 200px; }
    .groove-ring:nth-child(4)  { width: 270px;  height: 270px; }
    .groove-ring:nth-child(5)  { width: 350px;  height: 350px; }
    .groove-ring:nth-child(6)  { width: 440px;  height: 440px; }
    .groove-ring:nth-child(7)  { width: 540px;  height: 540px; }
    .groove-ring:nth-child(8)  { width: 660px;  height: 660px; }
    .groove-ring:nth-child(9)  { width: 800px;  height: 800px; }
    .groove-ring:nth-child(10) { width: 960px;  height: 960px; }
    .groove-ring:nth-child(11) { width: 1140px; height: 1140px; }
    .groove-ring:nth-child(12) { width: 1360px; height: 1360px; }

    /* Content */
    .content {
      position: relative;
      z-index: 5;
      text-align: center;
    }

    .pre-heading {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: #bbb;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .daze-word {
      font-size: clamp(6rem, 18vw, 14rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      line-height: 0.85;
      margin-bottom: 24px;
      display: inline-flex;
    }

    .daze-letter {
      display: inline-block;
      opacity: 0.12;
      transition: opacity 0.4s ease;
      position: relative;
    }

    /* Gentle idle drift - very subtle, smooth start */
    .daze-letter { animation: gentleDrift 6s ease-in-out infinite; }
    .daze-letter:nth-child(1) { animation-delay: 0s; }
    .daze-letter:nth-child(2) { animation-delay: 1.5s; }
    .daze-letter:nth-child(3) { animation-delay: 3s; }
    .daze-letter:nth-child(4) { animation-delay: 4.5s; }

    @keyframes gentleDrift {
      0%, 100% { opacity: 0.12; }
      50% { opacity: 0.25; }
    }

    .tagline {
      font-size: 0.92rem;
      color: #999;
      margin-bottom: 6px;
    }

    .sub-tagline {
      font-size: 0.78rem;
      color: #bbb;
    }

    /* Filter */
    .filter-area {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .filter-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #ccc;
      transition: color 0.2s;
    }
    .filter-icon:hover { color: #999; }

    .filter-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #ccc;
      margin-top: 2px;
    }

    .genre-pills {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      pointer-events: none;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-area:hover .genre-pills {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .filter-area:hover .filter-label { color: #999; }

    .genre-pill {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 5px 12px;
      border: 1px solid #ddd;
      color: #999;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
      font-family: inherit;
    }
    .genre-pill:hover { border-color: #111; color: #111; }
    .genre-pill.active { background: #111; border-color: #111; color: #fff; }

    /* Result */
    .result-state {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
    }

    .album-art {
      width: 360px;
      height: 360px;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460, #e94560);
      animation: recordDrop 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes recordDrop {
      from { opacity: 0; transform: scale(0.88) translateY(-16px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .album-title {
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: -0.03em;
      margin-top: 28px;
      margin-bottom: 4px;
    }

    .artist-name {
      font-size: 1rem;
      color: #999;
      margin-bottom: 32px;
    }

    .result-actions {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .btn-primary {
      background: #111;
      color: #fff;
      padding: 14px 32px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #333; }

    .btn-link {
      font-size: 0.82rem;
      color: #999;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }
    .btn-link:hover { color: #111; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">MELODAZE</div>
    <div class="nav-links">
      <a href="#" class="active">Dashboard</a>
      <a href="#">Collection</a>
      <a href="#">Analytics</a>
      <a href="#">Settings</a>
    </div>
  </nav>

  <div class="dashboard" id="emptyState" onclick="showResult()">
    <div class="grooves-bg" id="groovesBg">
      <div class="groove-ring"></div>
      <div class="groove-ring"></div>
      <div class="groove-ring"></div>
      <div class="groove-ring"></div>
      <div class="groove-ring"></div>
      <div class="groove-ring"></div>
      <div class="groove-ring"></div>
      <div class="groove-ring"></div>
      <div class="groove-ring"></div>
      <div class="groove-ring"></div>
      <div class="groove-ring"></div>
      <div class="groove-ring"></div>
    </div>

    <div class="content">
      <div class="pre-heading">Get lost in</div>
      <div class="daze-word" id="dazeWord">
        <span class="daze-letter">D</span>
        <span class="daze-letter">A</span>
        <span class="daze-letter">Z</span>
        <span class="daze-letter">E</span>
      </div>
      <div class="tagline">Rediscover what you already own</div>
      <div class="sub-tagline">Pull a record from your shelves</div>
    </div>

    <div class="filter-area" onclick="event.stopPropagation()">
      <div class="filter-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="4" y1="6" x2="20" y2="6"></line>
          <line x1="7" y1="12" x2="17" y2="12"></line>
          <line x1="10" y1="18" x2="14" y2="18"></line>
        </svg>
      </div>
      <div class="filter-label">Filter</div>
      <div class="genre-pills">
        <button class="genre-pill active">All</button>
        <button class="genre-pill">Rock</button>
        <button class="genre-pill">Jazz</button>
        <button class="genre-pill">Electronic</button>
        <button class="genre-pill">Hip Hop</button>
        <button class="genre-pill">Soul</button>
        <button class="genre-pill">Classical</button>
        <button class="genre-pill">Folk</button>
      </div>
    </div>
  </div>

  <div class="result-state" id="resultState">
    <div class="album-art"></div>
    <div class="album-title">In Rainbows</div>
    <div class="artist-name">Radiohead</div>
    <div class="result-actions">
      <button class="btn-primary" onclick="showResult()">Get dazed again</button>
      <button class="btn-link" onclick="resetState()">back</button>
    </div>
  </div>

  <script>
    const dashboard = document.getElementById('emptyState');
    const letters = document.querySelectorAll('.daze-letter');
    const rings = document.querySelectorAll('.groove-ring');
    const groovesBg = document.getElementById('groovesBg');

    // Get center of the dashboard
    function getCenter() {
      const rect = dashboard.getBoundingClientRect();
      return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    }

    // Mouse proximity effect
    dashboard.addEventListener('mousemove', (e) => {
      const center = getCenter();
      const mouseX = e.clientX;
      const mouseY = e.clientY;

      // Distance from center (for rings)
      const distFromCenter = Math.sqrt(
        Math.pow(mouseX - center.x, 2) + Math.pow(mouseY - center.y, 2)
      );

      // Light up rings near the mouse distance from center
      rings.forEach((ring, i) => {
        const ringRadius = ring.offsetWidth / 2;
        const distFromRing = Math.abs(distFromCenter - ringRadius);
        const proximity = Math.max(0, 1 - distFromRing / 150);
        ring.style.opacity = 0.15 + proximity * 0.7;
        ring.style.borderColor = proximity > 0.3
          ? `rgba(17, 17, 17, ${0.08 + proximity * 0.15})`
          : '#eee';
      });

      // Light up letters based on mouse proximity to each letter
      letters.forEach((letter) => {
        const rect = letter.getBoundingClientRect();
        const letterCenterX = rect.left + rect.width / 2;
        const letterCenterY = rect.top + rect.height / 2;
        const dist = Math.sqrt(
          Math.pow(mouseX - letterCenterX, 2) + Math.pow(mouseY - letterCenterY, 2)
        );

        // Proximity radius — how close mouse needs to be
        const maxDist = 200;
        const proximity = Math.max(0, 1 - dist / maxDist);

        // Override the CSS animation when mouse is active
        letter.style.animation = 'none';
        letter.style.opacity = 0.08 + proximity * 0.92;
      });
    });

    // Reset to gentle drift when mouse leaves
    dashboard.addEventListener('mouseleave', () => {
      letters.forEach((letter, i) => {
        letter.style.animation = '';
        letter.style.opacity = '';
      });
      rings.forEach(ring => {
        ring.style.opacity = '';
        ring.style.borderColor = '';
      });
    });

    // Touch support — use touch position
    dashboard.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      const mouseEvent = new MouseEvent('mousemove', {
        clientX: touch.clientX,
        clientY: touch.clientY
      });
      dashboard.dispatchEvent(mouseEvent);
    });

    // Genre pills
    document.querySelectorAll('.genre-pill').forEach(pill => {
      pill.addEventListener('click', function(e) {
        e.stopPropagation();
        document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
      });
    });

    function showResult() {
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('resultState').style.display = 'flex';
    }

    function resetState() {
      document.getElementById('resultState').style.display = 'none';
      document.getElementById('emptyState').style.display = 'flex';
    }
  </script>
</body>
</html>
