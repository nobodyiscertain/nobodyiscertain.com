<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melodaze CTA — The Groove</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 20px 40px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 500; color: #999; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { font-size: 0.82rem; color: #bbb; text-decoration: none; }
    .nav-links a.active { color: #111; }

    .dashboard {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
    }

    /* Vinyl grooves */
    .vinyl-container {
      position: relative;
      width: 280px;
      height: 280px;
      cursor: pointer;
      margin-bottom: 40px;
    }

    .groove {
      position: absolute;
      border: 1px solid transparent;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: drawGroove 8s ease-out infinite;
    }

    .groove:nth-child(1) { width: 60px; height: 60px; animation-delay: 0s; }
    .groove:nth-child(2) { width: 90px; height: 90px; animation-delay: 0.3s; }
    .groove:nth-child(3) { width: 120px; height: 120px; animation-delay: 0.6s; }
    .groove:nth-child(4) { width: 150px; height: 150px; animation-delay: 0.9s; }
    .groove:nth-child(5) { width: 180px; height: 180px; animation-delay: 1.2s; }
    .groove:nth-child(6) { width: 210px; height: 210px; animation-delay: 1.5s; }
    .groove:nth-child(7) { width: 240px; height: 240px; animation-delay: 1.8s; }
    .groove:nth-child(8) { width: 270px; height: 270px; animation-delay: 2.1s; }

    @keyframes drawGroove {
      0% { border-color: transparent; }
      15% { border-color: #e0e0e0; }
      50% { border-color: #ddd; }
      85% { border-color: #e8e8e8; }
      100% { border-color: transparent; }
    }

    /* Spindle */
    .spindle {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #111;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    /* Hover: grooves speed up and darken */
    .vinyl-container:hover .groove {
      animation-duration: 3s;
      border-color: #ccc;
    }

    .vinyl-container:hover .spindle {
      transform: translate(-50%, -50%) scale(1.3);
      transition: transform 0.3s;
    }

    /* Slow rotation of the whole thing */
    .vinyl-rotate {
      animation: spin 20s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .cta-btn {
      display: inline-block;
      background: #111;
      color: #fff;
      padding: 14px 32px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s;
      margin-bottom: 12px;
    }

    .cta-btn:hover { background: #333; }

    .cta-sub {
      font-size: 0.82rem;
      color: #bbb;
      margin-bottom: 32px;
    }

    .genre-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .genre-pill {
      font-size: 0.72rem;
      font-weight: 500;
      padding: 6px 14px;
      border: 1px solid #eee;
      color: #ccc;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      font-family: inherit;
    }

    .genre-pill:hover { border-color: #999; color: #999; }
    .genre-pill.active { border-color: #111; color: #111; }

    /* Result */
    .result-state {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
    }

    .album-art {
      width: 320px;
      height: 320px;
      background: linear-gradient(135deg, #2d1b69, #11998e, #38ef7d);
      animation: slideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .album-title {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: -0.03em;
      margin-top: 24px;
      margin-bottom: 4px;
    }

    .artist-name {
      font-size: 1rem;
      color: #999;
      margin-bottom: 28px;
    }

    .action-row {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .again-link {
      font-size: 0.82rem;
      color: #999;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }

    .again-link:hover { color: #111; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">MELODAZE</div>
    <div class="nav-links">
      <a href="#" class="active">Dashboard</a>
      <a href="#">Collection</a>
      <a href="#">Analytics</a>
      <a href="#">Settings</a>
    </div>
  </nav>

  <div class="dashboard" id="emptyState">
    <div class="vinyl-container" onclick="showResult()">
      <div class="vinyl-rotate">
        <div class="groove"></div>
        <div class="groove"></div>
        <div class="groove"></div>
        <div class="groove"></div>
        <div class="groove"></div>
        <div class="groove"></div>
        <div class="groove"></div>
        <div class="groove"></div>
      </div>
      <div class="spindle"></div>
    </div>

    <button class="cta-btn" onclick="showResult()">Drop the needle</button>
    <div class="cta-sub">We'll pick something from your shelves</div>

    <div class="genre-row">
      <button class="genre-pill active">All</button>
      <button class="genre-pill">Rock</button>
      <button class="genre-pill">Jazz</button>
      <button class="genre-pill">Electronic</button>
      <button class="genre-pill">Hip Hop</button>
      <button class="genre-pill">Soul</button>
    </div>
  </div>

  <div class="result-state" id="resultState">
    <div class="album-art"></div>
    <div class="album-title">Kid A</div>
    <div class="artist-name">Radiohead</div>
    <div class="action-row">
      <button class="cta-btn" onclick="showResult()">Drop again</button>
      <button class="again-link" onclick="resetState()">back to crate</button>
    </div>
  </div>

  <script>
    document.querySelectorAll('.genre-pill').forEach(pill => {
      pill.addEventListener('click', function() {
        document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
      });
    });

    function showResult() {
      document.getElementById('emptyState').style.display = 'none';
      const result = document.getElementById('resultState');
      result.style.display = 'flex';
    }

    function resetState() {
      document.getElementById('resultState').style.display = 'none';
      document.getElementById('emptyState').style.display = 'flex';
    }
  </script>
</body>
</html>
