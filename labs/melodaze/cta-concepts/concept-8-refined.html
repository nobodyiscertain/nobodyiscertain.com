<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melodaze CTA — Refined</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    nav {
      padding: 20px 40px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 10;
      background: #fafafa;
    }
    .logo { font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 500; color: #999; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { font-size: 0.82rem; color: #bbb; text-decoration: none; }
    .nav-links a.active { color: #111; }

    .dashboard {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      user-select: none;
    }

    .grooves-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .groove-ring {
      position: absolute;
      border: 1px solid #e8e8e8;
      border-radius: 50%;
      transition: opacity 0.6s ease, border-color 0.6s ease;
    }

    /* Spindle — static black dot, no pulsing */
    .spindle {
      position: absolute;
      width: 36px;
      height: 36px;
      background: #111;
      border-radius: 50%;
      z-index: 5;
      cursor: pointer;
      transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1),
                  height 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    /* Text floats above the dot, not inside it */
    .center-text {
      position: absolute;
      z-index: 6;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .center-text .tagline {
      font-size: 0.85rem;
      color: #111;
      font-weight: 400;
      line-height: 1.5;
    }

    /* Filter */
    .filter-area {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .filter-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #ccc;
      transition: color 0.2s;
    }
    .filter-icon:hover { color: #999; }

    .filter-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #ccc;
      margin-top: 2px;
    }

    .genre-pills {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      pointer-events: none;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-area:hover .genre-pills {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    .filter-area:hover .filter-label { color: #999; }

    .genre-pill {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 5px 12px;
      border: 1px solid #ddd;
      color: #999;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
      font-family: inherit;
    }
    .genre-pill:hover { border-color: #111; color: #111; }
    .genre-pill.active { background: #111; border-color: #111; color: #fff; }

    /* Result */
    .result-state {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
    }

    .album-art {
      width: 360px;
      height: 360px;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460, #e94560);
      animation: recordDrop 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes recordDrop {
      from { opacity: 0; transform: scale(0.88) translateY(-16px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .album-title {
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: -0.03em;
      margin-top: 28px;
      margin-bottom: 4px;
    }

    .artist-name {
      font-size: 1rem;
      color: #999;
      margin-bottom: 32px;
    }

    .result-actions {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .btn-primary {
      background: #111;
      color: #fff;
      padding: 14px 32px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #333; }

    .btn-link {
      font-size: 0.82rem;
      color: #999;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }
    .btn-link:hover { color: #111; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">MELODAZE</div>
    <div class="nav-links">
      <a href="#" class="active">Dashboard</a>
      <a href="#">Collection</a>
      <a href="#">Analytics</a>
      <a href="#">Settings</a>
    </div>
  </nav>

  <div class="dashboard" id="emptyState">
    <div class="grooves-bg" id="groovesBg"></div>
    <div class="spindle" id="spindle"></div>
    <div class="center-text" id="centerText">
      <div class="tagline">Rediscover what<br>you already own</div>
    </div>

    <div class="filter-area">
      <div class="filter-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="4" y1="6" x2="20" y2="6"></line>
          <line x1="7" y1="12" x2="17" y2="12"></line>
          <line x1="10" y1="18" x2="14" y2="18"></line>
        </svg>
      </div>
      <div class="filter-label">Filter</div>
      <div class="genre-pills">
        <button class="genre-pill active">All</button>
        <button class="genre-pill">Rock</button>
        <button class="genre-pill">Jazz</button>
        <button class="genre-pill">Electronic</button>
        <button class="genre-pill">Hip Hop</button>
        <button class="genre-pill">Soul</button>
        <button class="genre-pill">Classical</button>
        <button class="genre-pill">Folk</button>
      </div>
    </div>
  </div>

  <div class="result-state" id="resultState">
    <div class="album-art"></div>
    <div class="album-title">In Rainbows</div>
    <div class="artist-name">Radiohead</div>
    <div class="result-actions">
      <button class="btn-primary" onclick="showResult()">Pull another</button>
      <button class="btn-link" onclick="resetState()">back</button>
    </div>
  </div>

  <script>
    const dashboard = document.getElementById('emptyState');
    const groovesBg = document.getElementById('groovesBg');
    const spindle = document.getElementById('spindle');
    const centerText = document.getElementById('centerText');

    // Generate rings with increasing spacing (like original groove comp)
    // Tight near center, wide at edges
    const rings = [];
    let pos = 70;
    for (let i = 0; i < 30; i++) {
      const ring = document.createElement('div');
      ring.className = 'groove-ring';

      // Exponential-ish spacing: tight at center, wide at edges
      const gap = 14 + Math.pow(i, 1.4) * 2.2;
      pos += gap;

      ring.style.width = pos + 'px';
      ring.style.height = pos + 'px';
      ring.style.opacity = '0.35';
      groovesBg.appendChild(ring);
      rings.push({ el: ring, radius: pos / 2 });
    }

    function getCenter() {
      const rect = dashboard.getBoundingClientRect();
      return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    }

    // Click target = center 100px radius
    dashboard.addEventListener('click', (e) => {
      const center = getCenter();
      const dist = Math.sqrt(Math.pow(e.clientX - center.x, 2) + Math.pow(e.clientY - center.y, 2));
      if (dist < 100) {
        showResult();
      }
    });

    let rafId;
    dashboard.addEventListener('mousemove', (e) => {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(() => {
        const center = getCenter();
        const distFromCenter = Math.sqrt(
          Math.pow(e.clientX - center.x, 2) + Math.pow(e.clientY - center.y, 2)
        );

        const maxDist = Math.sqrt(Math.pow(window.innerWidth, 2) + Math.pow(window.innerHeight, 2)) * 0.4;
        const closeness = Math.max(0, 1 - distFromCenter / maxDist); // 0=far, 1=center

        // Spindle: grows gently, stays black, no pulse
        // Small growth: 36 → 80px max. Subtle, not ChatGPT blob.
        const spindleSize = 36 + closeness * closeness * 50;
        spindle.style.width = spindleSize + 'px';
        spindle.style.height = spindleSize + 'px';

        // Cursor
        dashboard.style.cursor = distFromCenter < 100 ? 'pointer' : 'default';

        // Text: fades in above the dot when close (last 25%)
        const textOpacity = Math.max(0, (closeness - 0.65) / 0.35);
        centerText.style.opacity = textOpacity;
        // Position text above spindle
        centerText.style.transform = `translateY(${-spindleSize / 2 - 50}px)`;

        // Rings: gentle response to mouse proximity
        // NOT dark/black — stay light gray, just become more/less visible
        rings.forEach((ring, i) => {
          const distFromRing = Math.abs(distFromCenter - ring.radius);

          // How close is mouse to this ring specifically?
          const ringProximity = Math.max(0, 1 - distFromRing / 140);

          // General visibility based on closeness to center
          // Inner rings show up first as you approach
          const ringDepth = i / rings.length;
          const baseVisibility = Math.max(0, closeness - ringDepth * 0.3) * 1.5;

          // Combined: base + proximity highlight
          const totalOpacity = Math.min(1, 0.15 + baseVisibility * 0.3 + ringProximity * 0.4);

          ring.el.style.opacity = totalOpacity;

          // Color: light grays only. Inner rings slightly warmer gray, outer = barely there
          // Range: #e0e0e0 (light) to #c0c0c0 (slightly darker near mouse)
          const gray = Math.round(225 - ringProximity * 40 - closeness * 15);
          ring.el.style.borderColor = `rgb(${gray}, ${gray}, ${gray})`;
        });
      });
    });

    dashboard.addEventListener('mouseleave', () => {
      spindle.style.width = '';
      spindle.style.height = '';
      centerText.style.opacity = '0';
      dashboard.style.cursor = '';

      rings.forEach(ring => {
        ring.el.style.opacity = '0.35';
        ring.el.style.borderColor = '';
      });
    });

    // Touch
    dashboard.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      dashboard.dispatchEvent(new MouseEvent('mousemove', {
        clientX: touch.clientX,
        clientY: touch.clientY
      }));
    }, { passive: false });

    dashboard.addEventListener('touchend', () => {
      showResult();
    });

    // Genre pills
    document.querySelectorAll('.genre-pill').forEach(pill => {
      pill.addEventListener('click', function(e) {
        e.stopPropagation();
        document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
      });
    });

    function showResult() {
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('resultState').style.display = 'flex';
    }

    function resetState() {
      document.getElementById('resultState').style.display = 'none';
      document.getElementById('emptyState').style.display = 'flex';
      spindle.style.width = '';
      spindle.style.height = '';
      centerText.style.opacity = '0';
      rings.forEach(ring => {
        ring.el.style.opacity = '0.35';
        ring.el.style.borderColor = '';
      });
    }
  </script>
</body>
</html>
