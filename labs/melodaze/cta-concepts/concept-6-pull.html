<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melodaze CTA — The Pull</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    nav {
      padding: 20px 40px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 10;
      background: #fafafa;
    }
    .logo { font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 500; color: #999; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { font-size: 0.82rem; color: #bbb; text-decoration: none; }
    .nav-links a.active { color: #111; }

    .dashboard {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    /* Groove rings */
    .grooves-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .groove-ring {
      position: absolute;
      border: 1px solid #eee;
      border-radius: 50%;
      transition: border-color 0.3s ease, opacity 0.3s ease;
    }

    /* Idle breathing */
    .groove-ring { animation: idleBreathe 6s ease-in-out infinite; }
    .groove-ring:nth-child(odd) { animation-direction: reverse; }

    @keyframes idleBreathe {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.45; }
    }

    /* Center spindle — solid black circle */
    .spindle {
      position: absolute;
      width: 48px;
      height: 48px;
      background: #111;
      border-radius: 50%;
      z-index: 3;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .dashboard:hover .spindle {
      transform: scale(1.1);
    }

    /* Text below */
    .content {
      position: relative;
      z-index: 5;
      text-align: center;
      margin-top: 340px;
    }

    .tagline {
      font-size: 0.88rem;
      color: #bbb;
      transition: color 0.3s;
    }

    .dashboard:hover .tagline { color: #999; }

    .sub-tagline {
      font-size: 0.72rem;
      color: #ccc;
      margin-top: 4px;
    }

    /* Filter */
    .filter-area {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .filter-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #ccc;
      transition: color 0.2s;
    }
    .filter-icon:hover { color: #999; }

    .filter-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #ccc;
      margin-top: 2px;
    }

    .genre-pills {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      pointer-events: none;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-area:hover .genre-pills {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    .filter-area:hover .filter-label { color: #999; }

    .genre-pill {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 5px 12px;
      border: 1px solid #ddd;
      color: #999;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
      font-family: inherit;
    }
    .genre-pill:hover { border-color: #111; color: #111; }
    .genre-pill.active { background: #111; border-color: #111; color: #fff; }

    /* Result */
    .result-state {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
    }

    .album-art {
      width: 360px;
      height: 360px;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460, #e94560);
      animation: recordDrop 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes recordDrop {
      from { opacity: 0; transform: scale(0.88) translateY(-16px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .album-title {
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: -0.03em;
      margin-top: 28px;
      margin-bottom: 4px;
    }

    .artist-name {
      font-size: 1rem;
      color: #999;
      margin-bottom: 32px;
    }

    .result-actions {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .btn-primary {
      background: #111;
      color: #fff;
      padding: 14px 32px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #333; }

    .btn-link {
      font-size: 0.82rem;
      color: #999;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }
    .btn-link:hover { color: #111; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">MELODAZE</div>
    <div class="nav-links">
      <a href="#" class="active">Dashboard</a>
      <a href="#">Collection</a>
      <a href="#">Analytics</a>
      <a href="#">Settings</a>
    </div>
  </nav>

  <div class="dashboard" id="emptyState" onclick="showResult()">
    <div class="grooves-bg" id="groovesBg"></div>
    <div class="spindle" id="spindle"></div>

    <div class="content">
      <div class="tagline">Rediscover what you already own</div>
      <div class="sub-tagline">Pull a record from your shelves</div>
    </div>

    <div class="filter-area" onclick="event.stopPropagation()">
      <div class="filter-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="4" y1="6" x2="20" y2="6"></line>
          <line x1="7" y1="12" x2="17" y2="12"></line>
          <line x1="10" y1="18" x2="14" y2="18"></line>
        </svg>
      </div>
      <div class="filter-label">Filter</div>
      <div class="genre-pills">
        <button class="genre-pill active">All</button>
        <button class="genre-pill">Rock</button>
        <button class="genre-pill">Jazz</button>
        <button class="genre-pill">Electronic</button>
        <button class="genre-pill">Hip Hop</button>
        <button class="genre-pill">Soul</button>
        <button class="genre-pill">Classical</button>
        <button class="genre-pill">Folk</button>
      </div>
    </div>
  </div>

  <div class="result-state" id="resultState">
    <div class="album-art"></div>
    <div class="album-title">In Rainbows</div>
    <div class="artist-name">Radiohead</div>
    <div class="result-actions">
      <button class="btn-primary" onclick="showResult()">Pull another</button>
      <button class="btn-link" onclick="resetState()">back</button>
    </div>
  </div>

  <script>
    const dashboard = document.getElementById('emptyState');
    const groovesBg = document.getElementById('groovesBg');
    const spindle = document.getElementById('spindle');

    // Generate rings dynamically to fill the screen
    const ringCount = 28;
    const rings = [];
    for (let i = 0; i < ringCount; i++) {
      const ring = document.createElement('div');
      ring.className = 'groove-ring';
      const size = 48 + i * 65;
      ring.style.width = size + 'px';
      ring.style.height = size + 'px';
      // Stagger the idle animation
      ring.style.animationDelay = (i * 0.2) + 's';
      groovesBg.appendChild(ring);
      rings.push({ el: ring, radius: size / 2 });
    }

    function getCenter() {
      const rect = groovesBg.getBoundingClientRect();
      return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    }

    let isHovering = false;

    dashboard.addEventListener('mousemove', (e) => {
      isHovering = true;
      const center = getCenter();
      const mouseX = e.clientX;
      const mouseY = e.clientY;

      // Distance from center
      const distFromCenter = Math.sqrt(
        Math.pow(mouseX - center.x, 2) + Math.pow(mouseY - center.y, 2)
      );

      // Normalize: 0 = at center, 1 = far away
      const maxDist = Math.max(window.innerWidth, window.innerHeight) * 0.6;
      const normalizedDist = Math.min(distFromCenter / maxDist, 1);

      // Intensity increases as mouse gets closer to center
      const centerIntensity = 1 - normalizedDist;

      rings.forEach((ring, i) => {
        // How close is the mouse to this ring's radius?
        const distFromRing = Math.abs(distFromCenter - ring.radius);

        // Proximity to this specific ring (sharp falloff)
        const ringProximity = Math.max(0, 1 - distFromRing / 120);

        // Base intensity from being close to center
        const baseFromCenter = centerIntensity * 0.3;

        // Combined: rings near mouse are bright, everything closer to center is warmer
        const totalIntensity = Math.min(1, baseFromCenter + ringProximity * 0.8);

        // Stop CSS animation, take over
        ring.el.style.animation = 'none';

        // Opacity
        ring.el.style.opacity = 0.1 + totalIntensity * 0.9;

        // Border gets darker closer to center and near mouse
        const darkness = Math.round(220 - totalIntensity * 190);
        ring.el.style.borderColor = `rgb(${darkness}, ${darkness}, ${darkness})`;

        // Rings very close to center get slightly thicker when mouse is near center
        if (ring.radius < 200 && centerIntensity > 0.5) {
          ring.el.style.borderWidth = (1 + centerIntensity * 1.5) + 'px';
        } else {
          ring.el.style.borderWidth = '1px';
        }
      });
    });

    dashboard.addEventListener('mouseleave', () => {
      isHovering = false;
      rings.forEach((ring, i) => {
        ring.el.style.animation = '';
        ring.el.style.opacity = '';
        ring.el.style.borderColor = '';
        ring.el.style.borderWidth = '';
      });
    });

    // Touch
    dashboard.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      dashboard.dispatchEvent(new MouseEvent('mousemove', {
        clientX: touch.clientX,
        clientY: touch.clientY
      }));
    }, { passive: false });

    // Genre pills
    document.querySelectorAll('.genre-pill').forEach(pill => {
      pill.addEventListener('click', function(e) {
        e.stopPropagation();
        document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
      });
    });

    function showResult() {
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('resultState').style.display = 'flex';
    }

    function resetState() {
      document.getElementById('resultState').style.display = 'none';
      document.getElementById('emptyState').style.display = 'flex';
    }
  </script>
</body>
</html>
