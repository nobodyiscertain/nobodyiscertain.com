<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melodaze CTA — The Breath</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 20px 40px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 500; color: #999; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { font-size: 0.82rem; color: #bbb; text-decoration: none; }
    .nav-links a.active { color: #111; }

    .dashboard {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      cursor: pointer;
      user-select: none;
    }

    .daze-word {
      font-size: clamp(5rem, 15vw, 12rem);
      font-weight: 300;
      letter-spacing: -0.06em;
      color: #111;
      animation: breathe 4s ease-in-out infinite;
      transition: all 0.3s;
      position: relative;
      line-height: 1;
    }

    .daze-word::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: #111;
      transition: width 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .dashboard:hover .daze-word {
      animation: none;
      opacity: 1;
    }

    .dashboard:hover .daze-word::after {
      width: 100%;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }

    .daze-sub {
      font-size: 0.88rem;
      color: #bbb;
      margin-top: 20px;
      transition: color 0.3s;
    }

    .dashboard:hover .daze-sub {
      color: #999;
    }

    .genre-row {
      display: flex;
      gap: 8px;
      margin-top: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .genre-pill {
      font-size: 0.72rem;
      font-weight: 500;
      padding: 6px 14px;
      border: 1px solid #eee;
      color: #ccc;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      font-family: inherit;
    }

    .genre-pill:hover { border-color: #999; color: #999; }
    .genre-pill.active { border-color: #111; color: #111; }

    /* Result state */
    .result-state {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      animation: fadeUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .album-art {
      width: 340px;
      height: 340px;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460, #e94560);
      margin-bottom: 28px;
    }

    .album-title {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .artist-name {
      font-size: 1rem;
      color: #999;
      margin-bottom: 32px;
    }

    .again-btn {
      font-size: 0.85rem;
      color: #bbb;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 8px 0;
      transition: color 0.2s;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .again-btn:hover { color: #111; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">MELODAZE</div>
    <div class="nav-links">
      <a href="#" class="active">Dashboard</a>
      <a href="#">Collection</a>
      <a href="#">Analytics</a>
      <a href="#">Settings</a>
    </div>
  </nav>

  <div class="dashboard" id="emptyState" onclick="showResult()">
    <div class="daze-word">DAZE</div>
    <div class="daze-sub">Tap to pull a record from your collection</div>
    <div class="genre-row" onclick="event.stopPropagation()">
      <button class="genre-pill active">All</button>
      <button class="genre-pill">Rock</button>
      <button class="genre-pill">Jazz</button>
      <button class="genre-pill">Electronic</button>
      <button class="genre-pill">Hip Hop</button>
      <button class="genre-pill">Soul</button>
    </div>
  </div>

  <div class="result-state" id="resultState">
    <div class="album-art"></div>
    <div class="album-title">In Rainbows</div>
    <div class="artist-name">Radiohead</div>
    <button class="again-btn" onclick="resetState()">get dazed again</button>
  </div>

  <script>
    document.querySelectorAll('.genre-pill').forEach(pill => {
      pill.addEventListener('click', function() {
        document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
      });
    });

    function showResult() {
      document.getElementById('emptyState').style.display = 'none';
      const result = document.getElementById('resultState');
      result.style.display = 'flex';
    }

    function resetState() {
      document.getElementById('resultState').style.display = 'none';
      document.getElementById('emptyState').style.display = 'flex';
    }
  </script>
</body>
</html>
