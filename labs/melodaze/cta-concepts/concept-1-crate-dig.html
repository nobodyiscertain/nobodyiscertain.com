<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melodaze CTA — The Crate Dig</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Nav */
    nav {
      padding: 20px 40px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 500; color: #999; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { font-size: 0.82rem; color: #bbb; text-decoration: none; }
    .nav-links a.active { color: #111; }

    /* Dashboard */
    .dashboard {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
    }

    /* Crate */
    .crate {
      cursor: pointer;
      position: relative;
      width: 200px;
      height: 180px;
      margin-bottom: 40px;
    }

    .spine {
      position: absolute;
      width: 4px;
      background: #111;
      bottom: 0;
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .spine:nth-child(1) { height: 140px; left: 40px; animation: sway1 4s ease-in-out infinite; }
    .spine:nth-child(2) { height: 155px; left: 65px; animation: sway2 4.5s ease-in-out infinite; }
    .spine:nth-child(3) { height: 148px; left: 90px; animation: sway3 3.8s ease-in-out infinite; }
    .spine:nth-child(4) { height: 160px; left: 115px; animation: sway1 5s ease-in-out infinite; }
    .spine:nth-child(5) { height: 145px; left: 140px; animation: sway2 4.2s ease-in-out infinite; }

    @keyframes sway1 {
      0%, 100% { transform: rotate(-1.5deg); }
      50% { transform: rotate(1.5deg); }
    }
    @keyframes sway2 {
      0%, 100% { transform: rotate(1deg); }
      50% { transform: rotate(-1.5deg); }
    }
    @keyframes sway3 {
      0%, 100% { transform: rotate(-0.5deg); }
      50% { transform: rotate(2deg); }
    }

    .crate:hover .spine {
      transform: rotate(0deg) !important;
    }
    .crate:hover .spine:nth-child(1) { transform: translateX(-12px) rotate(-8deg) !important; }
    .crate:hover .spine:nth-child(2) { transform: translateX(-4px) rotate(-3deg) !important; }
    .crate:hover .spine:nth-child(3) { transform: rotate(0deg) !important; }
    .crate:hover .spine:nth-child(4) { transform: translateX(4px) rotate(3deg) !important; }
    .crate:hover .spine:nth-child(5) { transform: translateX(12px) rotate(8deg) !important; }

    /* Crate bottom */
    .crate-base {
      position: absolute;
      bottom: 0;
      left: 20px;
      right: 20px;
      height: 3px;
      background: #ddd;
    }

    .cta-text {
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: #111;
      margin-bottom: 8px;
    }

    .cta-sub {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 32px;
    }

    .genre-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .genre-pill {
      font-size: 0.72rem;
      font-weight: 500;
      padding: 6px 14px;
      border: 1px solid #ddd;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      font-family: inherit;
    }

    .genre-pill:hover { border-color: #111; color: #111; }
    .genre-pill.active { background: #111; border-color: #111; color: #fff; }

    /* Result state */
    .result {
      display: none;
      text-align: center;
    }

    .result .album-art {
      width: 320px;
      height: 320px;
      background: linear-gradient(135deg, #e74c3c, #8e44ad, #2c3e50);
      margin: 0 auto 24px;
    }

    .result .album-title {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .result .artist-name {
      font-size: 1rem;
      color: #999;
      margin-bottom: 24px;
    }

    .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.2em; color: #bbb; margin-bottom: 16px; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">MELODAZE</div>
    <div class="nav-links">
      <a href="#" class="active">Dashboard</a>
      <a href="#">Collection</a>
      <a href="#">Analytics</a>
      <a href="#">Settings</a>
    </div>
  </nav>

  <div class="dashboard" id="emptyState">
    <div class="label">YOUR COLLECTION IS READY</div>

    <div class="crate" onclick="showResult()">
      <div class="spine"></div>
      <div class="spine"></div>
      <div class="spine"></div>
      <div class="spine"></div>
      <div class="spine"></div>
      <div class="crate-base"></div>
    </div>

    <div class="cta-text">Dig in</div>
    <div class="cta-sub">Pull a record from your shelves</div>

    <div class="genre-pills">
      <button class="genre-pill active">All</button>
      <button class="genre-pill">Rock</button>
      <button class="genre-pill">Jazz</button>
      <button class="genre-pill">Electronic</button>
      <button class="genre-pill">Hip Hop</button>
      <button class="genre-pill">Soul</button>
    </div>
  </div>

  <div class="dashboard result" id="resultState">
    <div class="album-art"></div>
    <div class="album-title">OK Computer</div>
    <div class="artist-name">Radiohead</div>
    <button class="genre-pill active" onclick="resetState()">Pull another</button>
  </div>

  <script>
    // Genre pill toggle
    document.querySelectorAll('.genre-pill').forEach(pill => {
      pill.addEventListener('click', function(e) {
        if (this.closest('.genre-pills')) {
          document.querySelectorAll('.genre-pills .genre-pill').forEach(p => p.classList.remove('active'));
          this.classList.add('active');
        }
      });
    });

    function showResult() {
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('resultState').style.display = 'flex';
    }

    function resetState() {
      document.getElementById('resultState').style.display = 'none';
      document.getElementById('emptyState').style.display = 'flex';
    }
  </script>
</body>
</html>
